services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_tutor
      POSTGRES_PASSWORD: ai_tutor
      POSTGRES_DB: ai_tutor
    ports:
      - "5432:5432"
    volumes:
      - ai_tutor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_tutor -d ai_tutor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai_tutor_postgres_data:
