<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AI 家教">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>登录 - AI家庭教师</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/app-icon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>body { background: transparent; padding-bottom: 0; }</style>
</head>
<body>
  <div class="login-page">
    <div class="login-brand">
      <div class="login-logo">🎓</div>
      <div class="login-title">AI 家庭教师</div>
      <div class="login-subtitle">不直接给答案，陪你一步步想明白</div>
    </div>

    <div class="login-card">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input class="form-input" id="phone" type="tel" maxlength="11" placeholder="输入 11 位手机号">
      </div>

      <div class="form-group">
        <label class="form-label">昵称</label>
        <input class="form-input" id="nickname" type="text" maxlength="12" placeholder="想让 AI 怎么称呼你">
      </div>

      <div class="form-group">
        <label class="form-label">年级</label>
        <select class="form-select" id="grade">
          <option value="">请选择年级</option>
        </select>
      </div>

      <div class="form-group" id="inviteGroup" style="display:none;">
        <label class="form-label">内测邀请码</label>
        <input class="form-input" id="inviteCode" type="text" maxlength="40" placeholder="请输入内测邀请码">
      </div>

      <div class="form-group" id="otpGroup" style="display:none;">
        <label class="form-label">验证码</label>
        <input class="form-input" id="otpCode" type="tel" maxlength="6" placeholder="输入 6 位验证码">
      </div>

      <label class="agreement-row">
        <input id="consentAccepted" type="checkbox">
        <span>
          我已阅读并同意
          <a href="legal.html?type=terms">用户协议</a>、
          <a href="legal.html?type=privacy">隐私政策</a>
          和 <a href="legal.html?type=minors">未成年人使用说明</a>
        </span>
      </label>

      <button class="btn-primary" id="loginBtn">获取验证码</button>
    </div>

    <div class="login-tip">
      未配置后端时使用本地原型数据<br>
      配置后端后使用验证码登录
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pwa.js"></script>
  <script>
    // 填年级下拉
    const sel = document.getElementById('grade');
    GRADES.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.value;
      opt.textContent = g.label;
      sel.appendChild(opt);
    });

    // 已登录就直接进首页
    if (UserStore.isLoggedIn()) {
      location.replace('index.html');
    }
    if (!ApiClient.isEnabled()) {
      document.getElementById('loginBtn').textContent = '进入学习';
    }

    let otpRequestedFor = '';

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const phone = document.getElementById('phone').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const gradeVal = sel.value;
      const inviteCode = document.getElementById('inviteCode').value.trim();
      const otpCode = document.getElementById('otpCode').value.trim();
      const consentAccepted = document.getElementById('consentAccepted').checked;

      if (!/^1\d{10}$/.test(phone)) {
        alert('请输入 11 位手机号');
        return;
      }
      if (!nickname) {
        alert('请填写昵称');
        return;
      }
      if (!gradeVal) {
        alert('请选择年级');
        return;
      }
      if (!consentAccepted) {
        alert('请先阅读并同意用户协议、隐私政策和未成年人使用说明');
        return;
      }

      const grade = GRADES.find(g => g.value === gradeVal);
      const user = {
        phone,
        nickname,
        grade: grade.value,
        gradeLabel: grade.label,
        gradeStage: grade.stage,
        inviteCode,
        consentAccepted,
        policyVersion: 'internal-test-v1',
        consentAcceptedAt: Date.now(),
        createdAt: Date.now(),
      };
      if (ApiClient.isEnabled()) {
        try {
          if (otpRequestedFor !== phone) {
            const otp = await ApiClient.requestLoginOtp({ phone, inviteCode });
            otpRequestedFor = phone;
            document.getElementById('otpGroup').style.display = 'block';
            document.getElementById('loginBtn').textContent = '进入学习';
            if (otp.devCode) {
              document.getElementById('otpCode').value = otp.devCode;
            }
            alert(otp.devCode ? `开发环境验证码: ${otp.devCode}` : '验证码已发送');
            return;
          }
          if (!/^\d{6}$/.test(otpCode)) {
            alert('请输入 6 位验证码');
            return;
          }
          await ApiClient.loginWithOtp({ ...user, otpCode });
        } catch (error) {
          if (error.code === 'INVITE_CODE_REQUIRED') {
            document.getElementById('inviteGroup').style.display = 'block';
            alert('请输入正确的内测邀请码');
            return;
          }
          alert(`登录失败: ${error.message}`);
          return;
        }
      }

      UserStore.set(user);
      location.replace('index.html');
    });
  </script>
</body>
</html>
